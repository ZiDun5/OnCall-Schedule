<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:#eef7f4;min-height:100vh;padding:12px;font-size:14px}
button{font-family:'Tajawal',sans-serif;cursor:pointer}
input,textarea,select{font-family:'Tajawal',sans-serif}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#0d7a5f55;border-radius:3px}
.card{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:14px}
.btn-green{background:#0d7a5f;color:white;border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:700}
.btn-gray{background:#f3f4f6;color:#555;border:none;border-radius:9px;padding:10px 16px;font-size:13px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:white;border-radius:16px;width:100%;max-width:560px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-header{padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-body{overflow:auto;padding:14px 20px;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid #e5e7eb;display:flex;gap:10px;flex-shrink:0}
.tag{display:inline-block;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600}
.hidden{display:none!important}
@media print{
  body{background:white!important;padding:0!important}
  #main-app{display:none!important}
  #print-area{display:block!important}

}
#print-area{display:none}
#loading-screen{position:fixed;inset:0;background:#eef7f4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
</style>
</head>
<body>

<div id="print-area"></div>

<!-- VAC MODAL -->

      <button onclick="closeVacModal()" style="background:#f3f4f6;border:none;border-radius:8px;width:32px;height:32px;font-size:16px;color:#6b7280">✕</button>
    </div>
    <div class="modal-body" id="vac-modal-body"></div>
    <div class="modal-footer">
      <button class="btn-green" style="flex:1" onclick="saveVacModal()">✅ حفظ وتحديث الجدول</button>

<!-- PDF MODAL -->
<div id="pdf-modal" class="modal-overlay hidden">
  <div class="modal-box" style="max-width:600px;background:#f5f7fa">
    <div class="modal-header" style="background:white;border-radius:16px 16px 0 0">
      <div><div style="font-size:16px;font-weight:800;color:#0d7a5f">🖨️ تصدير PDF</div><div style="font-size:11px;color:#9ca3af;margin-top:2px">اختر الفترة وخصص التقرير</div></div>
      <button onclick="closePdfModal()" style="background:#f3f4f6;border:none;border-radius:8px;width:32px;height:32px;font-size:16px;color:#6b7280">✕</button>

      <button class="btn-gray" onclick="closePdfModal()">إلغاء</button>

<!-- CLINIC PICKER -->
<div id="clinic-picker" class="modal-overlay hidden">
  <div style="background:white;border-radius:14px;padding:16px 20px;box-shadow:0 10px 40px rgba(0,0,0,.2);min-width:280px;max-width:340px;width:100%">
    <div style="font-size:14px;font-weight:800;color:#0d7a5f;margin-bottom:4px">🏥 تعيين عيادة</div>
    <div id="clinic-picker-label" style="font-size:12px;color:#6b7280;margin-bottom:12px"></div>
    <div id="clinic-picker-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:12px"></div>
    <button id="clinic-picker-remove" onclick="clinicPickerRemove()" style="width:100%;padding:7px;background:#fee2e2;color:#b91c1c;border:none;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:8px;font-family:'Tajawal',sans-serif;cursor:pointer" class="hidden">✕ إزالة التعيين</button>
    <button onclick="closeClinicPicker()" style="width:100%;padding:8px;background:#f3f4f6;color:#555;border:none;border-radius:8px;font-size:13px;font-family:'Tajawal',sans-serif;cursor:pointer">إغلاق</button>
  </div>
</div>

<script>
/* ════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════ */
const EMPLOYEES=[
  "وضحى العتيبي","زريفة العنزي","سلمى الكناني","ختام المرشد",
  "منيفة المطيري","سارة الشهراني","سلطانة الايداء","نوال الطياوي",
  "فاطمة الحربي","حجاب العنزي","حمدان العتيبي","ماجد الجبرين",
  "محمد الدوسري","ثامر العثمان"
];
const MANAGER="زياد الحربي";
const CLINIC_NUMS=[8,9,13,14,15,16,17,18,19,20];
const AR_DAYS=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
const AR_DAYS_S=["أحد","اثنين","ثلاثاء","أربعاء","خميس","جمعة","سبت"];
const AR_MONTHS=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const fn=n=>n.split(" ")[0];

/* ════════════════════════════════════════
   FIREBASE
════════════════════════════════════════ */
const FB_URL='https://oncall-schedule-cfbf3-default-rtdb.europe-west1.firebasedatabase.app/data.json';
async function fbLoad(){
  try{
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),8000);
    const r=await fetch(FB_URL,{signal:ctrl.signal});
    clearTimeout(tid);
    if(!r.ok)return null;
    return await r.json();
  }catch(e){return null;}
}
async function fbSave(data){
  try{await fetch(FB_URL,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});}catch(e){}
}

/* ════════════════════════════════════════
   GENERATE DAYS
════════════════════════════════════════ */
function generateAllDays(numWeeks=9){
  const days=[];const d=new Date(2026,2,25);
  let weekNum=1,idx=0;
  while(weekNum<=numWeeks){
    const dow=d.getDay();
    if(dow===0&&idx>0){weekNum++;if(weekNum>numWeeks)break;}
    if(dow<=4){
      days.push({date:new Date(d),dayName:AR_DAYS[dow],dayShort:AR_DAYS_S[dow],
        weekNum,idx:idx++,day:d.getDate(),month:AR_MONTHS[d.getMonth()],
        monthNum:d.getMonth(),year:d.getFullYear()});
    }
    d.setDate(d.getDate()+1);
  }
  return days;
}
const ALL_DAYS=generateAllDays(9);
function getWeeksMap(){const m={};ALL_DAYS.forEach(d=>{if(!m[d.weekNum])m[d.weekNum]=[];m[d.weekNum].push(d);});return m;}
const WEEKS_MAP=getWeeksMap();
const WEEK_NUMS=Object.keys(WEEKS_MAP).map(Number).sort((a,b)=>a-b);
function weekDateRange(wn){
  const days=WEEKS_MAP[wn];const f=days[0],l=days[days.length-1];
  if(f.monthNum===l.monthNum)return`${f.day} – ${l.day} ${f.month} ${f.year}`;
  return`${f.day} ${f.month} – ${l.day} ${l.month} ${f.year}`;
}

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let S={
  vac:{},           // {empName:[dayIdx,...]}
  schedule:{},      // {dayIdx:{oncall:[],managerPresent:bool}}
  clinicAssign:{},  // {dayIdx:{empName:clinicNum}}
  selDay:0,
  curWeek:1,
  statsMode:'week',
  statsFrom:0,
  statsTo:ALL_DAYS.length-1,
  statsSelWeeks:[1],
  pdfPeriod:'week',
  pdfSelIdx:0,
  pdfNotes:'',
  pdfHeader:'قسم صحة الفم والأسنان',
  vacDraft:{},
  vacOpenEmp:null,
  pickerEmp:null,
  savedMsg:'',
};

/* ════════════════════════════════════════
   SCHEDULE LOGIC
════════════════════════════════════════ */
function isPresent(emp,dayIdx){return!(S.vac[emp]||[]).includes(dayIdx);}

function getEffectiveCounts(upTo){
  const c={};EMPLOYEES.forEach(e=>c[e]=0);
  for(let d=0;d<upTo;d++){
    (S.schedule[d]?.oncall||[]).forEach(e=>{if(c[e]!==undefined)c[e]++;});
    const absent=EMPLOYEES.filter(e=>!isPresent(e,d));
    if(absent.length){
      const need=S.schedule[d]?.managerPresent?5:4;
      const avg=(EMPLOYEES.length-absent.length)>0?need/(EMPLOYEES.length-absent.length):0;
      absent.forEach(e=>{c[e]=(c[e]||0)+avg;});
    }
  }
  return c;
}

function getRangeCounts(fromIdx,toIdx){
  const c={};EMPLOYEES.forEach(e=>c[e]=0);
  for(let d=fromIdx;d<=Math.min(toIdx,ALL_DAYS.length-1);d++){
    (S.schedule[d]?.oncall||[]).forEach(e=>{if(c[e]!==undefined)c[e]++;});
    const absent=EMPLOYEES.filter(e=>!isPresent(e,d));
    if(absent.length){
      const need=S.schedule[d]?.managerPresent?5:4;
      const avg=(EMPLOYEES.length-absent.length)>0?need/(EMPLOYEES.length-absent.length):0;
      absent.forEach(e=>{c[e]=(c[e]||0)+avg;});
    }
  }
  return c;
}

function suggest(dayIdx,managerPresent,scheduleRef){
  const sch=scheduleRef||S.schedule;
  const needed=managerPresent?5:4;
  // effective counts up to dayIdx using sch
  const c={};EMPLOYEES.forEach(e=>c[e]=0);
  for(let d=0;d<dayIdx;d++){
    (sch[d]?.oncall||[]).forEach(e=>{if(c[e]!==undefined)c[e]++;});
    const absent=EMPLOYEES.filter(e=>!isPresent(e,d));
    if(absent.length){
      const need=sch[d]?.managerPresent?5:4;
      const avg=(EMPLOYEES.length-absent.length)>0?need/(EMPLOYEES.length-absent.length):0;
      absent.forEach(e=>{c[e]=(c[e]||0)+avg;});
    }
  }
  const prev=new Set(dayIdx>0?(sch[dayIdx-1]?.oncall||[]):[]);
  const avail=EMPLOYEES.filter(e=>isPresent(e,dayIdx));
  const sorted=[...avail].sort((a,b)=>c[a]-c[b]||EMPLOYEES.indexOf(a)-EMPLOYEES.indexOf(b));
  return[...sorted.filter(e=>!prev.has(e)),...sorted.filter(e=>prev.has(e))].slice(0,needed);
}

function buildInit(){
  const s={};
  for(let i=0;i<ALL_DAYS.length;i++)
    s[i]={oncall:suggest(i,false,s),managerPresent:false};
  return s;
}

/* ════════════════════════════════════════
   SAVE / LOAD
════════════════════════════════════════ */
let saveTimer=null;
function scheduleSave(){
  if(saveTimer)clearTimeout(saveTimer);
  S.savedMsg='جاري الحفظ...';
  updateSavedMsg();
  saveTimer=setTimeout(async()=>{
    const _d={vac:S.vac,schedule:S.schedule,clinicAssign:S.clinicAssign,selDay:S.selDay,curWeek:S.curWeek};
    lsSave(_d);
    if(location.protocol!=='file:') await fbSave(_d);
    S.savedMsg='✓ محفوظ';
    updateSavedMsg();
    setTimeout(()=>{S.savedMsg='';updateSavedMsg();},2000);
  },1500);
}
function updateSavedMsg(){
  const el=document.getElementById('saved-msg');
  if(!el)return;
  if(S.savedMsg){el.textContent=S.savedMsg;el.style.display='inline-block';}
  else el.style.display='none';
}

/* ════════════════════════════════════════
   WARN
════════════════════════════════════════ */
function warnLevel(emp,dayIdx){
  const prev=new Set(dayIdx>0?(S.schedule[dayIdx-1]?.oncall||[]):[]);
  if(prev.has(emp))return'red';
  const cntBefore=getEffectiveCounts(dayIdx);
  let slotsBefore=0;
  for(let d=0;d<dayIdx;d++)slotsBefore+=S.schedule[d]?.managerPresent?5:4;
  const avg=slotsBefore/14;
  if(cntBefore[emp]>avg+1)return'yellow';
  return'green';
}
const WC={
  red:{bg:'#fff1f2',border:'#fca5a5',dot:'#ef4444',text:'#b91c1c',tag:'📵 متتالي'},
  yellow:{bg:'#fefce8',border:'#fde047',dot:'#f59e0b',text:'#a16207',tag:'⚠️ زائد'},
  green:{bg:'#f0fdf4',border:'#86efac',dot:'#22c55e',text:'#166534',tag:'✅ صالح'},
};

/* ════════════════════════════════════════
   MAIN RENDER
════════════════════════════════════════ */
function render(){
  const app=document.getElementById('main-app');
  const d=ALL_DAYS[S.selDay];
  const day=S.schedule[S.selDay]||{oncall:[],managerPresent:false};
  const needed=day.managerPresent?5:4;
  const oncallSet=new Set(day.oncall);
  const availToday=EMPLOYEES.filter(e=>isPresent(e,S.selDay));
  const clinicStaff=availToday.filter(e=>!oncallSet.has(e));
  const vacToday=EMPLOYEES.filter(e=>!isPresent(e,S.selDay));
  const totalVacDays=Object.values(S.vac).reduce((s,a)=>s+a.length,0);
  const cycleWeek=((S.curWeek-1)%7)+1;
  const oncallFull=day.oncall.length===needed;
  const clinicCount=clinicStaff.length+(day.managerPresent?1:0);
  const redW=day.oncall.filter(e=>warnLevel(e,S.selDay)==='red');
  const yelW=day.oncall.filter(e=>warnLevel(e,S.selDay)==='yellow');
  const weekDays=WEEKS_MAP[S.curWeek]||[];
  const assign=S.clinicAssign[S.selDay]||{};
  const clinicEmp={};Object.entries(assign).forEach(([e,c])=>clinicEmp[c]=e);

  app.innerHTML=`
  <!-- HEADER -->
  <div style="background:linear-gradient(135deg,#0d7a5f,#0fa872);color:white;border-radius:14px;padding:14px 18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
    <div>
      <div style="font-size:18px;font-weight:800">🦷 جدول مناوبة الاتصال</div>
      <div style="font-size:11px;opacity:.75;margin-top:3px">قسم صحة الفم والأسنان • 4:00م – 11:00م • 10 عيادات</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <button onclick="openVacModal()" style="background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);border-radius:9px;padding:8px 14px;color:white;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px">
        🏖️ إجازات ${totalVacDays>0?`<span style="background:#fbbf24;color:#1a1a1a;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:800">${totalVacDays}</span>`:''}
      </button>
      <button onclick="openPdfModal()" style="background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);border-radius:9px;padding:8px 14px;color:white;font-size:13px;font-weight:700">🖨️ PDF</button>
      <button onclick="resetAll()" title="مسح البيانات" style="background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.25);border-radius:9px;padding:8px 12px;color:rgba(255,255,255,.7);font-size:13px;border:none">🗑️</button>
      <span id="saved-msg" style="font-size:11px;color:rgba(255,255,255,.85);background:rgba(0,0,0,.2);border-radius:7px;padding:4px 9px;display:none"></span>
      <div style="text-align:center;background:rgba(255,255,255,.15);border-radius:10px;padding:7px 13px">
        <div style="font-size:20px;font-weight:800">${EMPLOYEES.length}</div><div style="font-size:10px;opacity:.8">موظف</div>
      </div>
    </div>
  </div>

  <!-- WEEK NAV -->
  <div class="card" style="margin-bottom:12px;padding:12px 16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <button onclick="prevWeek()" ${S.curWeek===1?'disabled':''} style="background:${S.curWeek===1?'#f3f4f6':'#0d7a5f'};color:${S.curWeek===1?'#ccc':'white'};border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;opacity:${S.curWeek===1?.5:1}">＜ السابق</button>
      <div style="text-align:center">
        <div style="font-size:15px;font-weight:800;color:#0d7a5f">الأسبوع ${S.curWeek} <span style="font-size:11px;font-weight:400;color:#9ca3af">(${[...new Set((WEEKS_MAP[S.curWeek]||[]).map(d=>d.month))].join(' – ')})</span></div>
        <div style="font-size:12px;color:#6b7280;margin-top:2px">${weekDateRange(S.curWeek)}</div>
        <div style="margin-top:5px;display:flex;align-items:center;gap:8px;justify-content:center">
          <span style="font-size:10px;color:#9ca3af">دورة ${cycleWeek}/7</span>
          <div style="width:70px;height:4px;background:#e5e7eb;border-radius:2px;overflow:hidden"><div style="width:${Math.round(cycleWeek/7*100)}%;height:100%;background:#0d7a5f;border-radius:2px"></div></div>
        </div>
      </div>
      <button onclick="nextWeek()" ${S.curWeek===WEEK_NUMS[WEEK_NUMS.length-1]?'disabled':''} style="background:${S.curWeek===WEEK_NUMS[WEEK_NUMS.length-1]?'#f3f4f6':'#0d7a5f'};color:${S.curWeek===WEEK_NUMS[WEEK_NUMS.length-1]?'#ccc':'white'};border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;opacity:${S.curWeek===WEEK_NUMS[WEEK_NUMS.length-1]?.5:1}">التالي ＞</button>
    </div>
    <div style="display:flex;gap:6px">
      ${weekDays.map(dd=>{
        const ds=S.schedule[dd.idx]||{oncall:[],managerPresent:false};
        const dprev=new Set(dd.idx>0?(S.schedule[dd.idx-1]?.oncall||[]):[]);
        const hasRed=(ds.oncall||[]).some(e=>dprev.has(e));
        const incomplete=(ds.oncall||[]).length<(ds.managerPresent?5:4);
        const vacCnt=EMPLOYEES.filter(e=>!isPresent(e,dd.idx)).length;
        const isSel=S.selDay===dd.idx;
        const asgn=S.clinicAssign[dd.idx]||{};
        const asCnt=Object.keys(asgn).length;
        return`<button onclick="selDay(${dd.idx})" style="flex:1;padding:8px 4px;border-radius:10px;border:2px solid ${isSel?'#0d7a5f':'#e5e7eb'};background:${isSel?'#daf0e8':'white'};color:${isSel?'#0d7a5f':'#555'};position:relative;font-size:12px;font-weight:${isSel?800:500};line-height:1.3;transition:all .15s">
          ${(hasRed||incomplete)?`<span style="position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;background:${incomplete?'#ef4444':'#f59e0b'};border:2px solid #eef7f4"></span>`:''}
          <div>${dd.dayShort}</div>
          <div style="font-size:13px;font-weight:700;margin-top:2px;color:${isSel?'#0d7a5f':'#374151'}">${dd.day}</div>
          <div style="font-size:10px;opacity:.7">${dd.month}</div>
          ${vacCnt>0?`<div style="font-size:10px;color:${isSel?'#0d7a5f':'#d97706'};margin-top:2px">🏖️${vacCnt}</div>`:''}
          ${asCnt>0?`<div style="font-size:10px;color:${isSel?'#0d7a5f':'#6b7280'}">ع${asCnt}</div>`:''}
        </button>`;
      }).join('')}
    </div>
    <div style="margin-top:10px;padding-top:10px;border-top:1px dashed #e5e7eb;text-align:center;color:#0d7a5f;font-weight:700;font-size:13px">
      📅 ${d.dayName} ${d.day} ${d.month} ${d.year}
    </div>
  </div>

  <!-- WARNINGS -->
  ${(redW.length||yelW.length)?`
  <div style="border-radius:9px;padding:10px 14px;margin-bottom:10px;font-size:13px;background:${redW.length?'#fff1f2':'#fefce8'};border:1.5px solid ${redW.length?'#fca5a5':'#fde047'}">
    ${redW.length?`<div style="color:#b91c1c;font-weight:600">📵 تحذير: <strong>${redW.map(fn).join('، ')}</strong> كانوا على الاتصال أمس!</div>`:''}
    ${yelW.length?`<div style="color:#a16207${redW.length?';margin-top:4px':''}">⚠️ <strong>${yelW.map(fn).join('، ')}</strong> تجاوزوا متوسط أيام الاتصال</div>`:''}
  </div>`:''}
  ${vacToday.length?`

/* ════════════════════════════════════════
   STATS PANEL
════════════════════════════════════════ */
function getStatsRange(){
  if(S.statsMode==='week'){const wd=WEEKS_MAP[S.curWeek]||[];return{f:wd[0]?.idx||0,t:wd[wd.length-1]?.idx||0};}
  if(S.statsMode==='2weeks'){const wn2=Math.min(S.curWeek+1,WEEK_NUMS[WEEK_NUMS.length-1]);const a=[...(WEEKS_MAP[S.curWeek]||[]),...(WEEKS_MAP[wn2]||[])];return{f:a[0]?.idx||0,t:a[a.length-1]?.idx||0};}
  if(S.statsMode==='multiweek'){const a=S.statsSelWeeks.flatMap(wn=>WEEKS_MAP[wn]||[]).sort((a,b)=>a.idx-b.idx);return a.length?{f:a[0].idx,t:a[a.length-1].idx}:{f:0,t:0};}
  return{f:S.statsFrom,t:S.statsTo};
}
function renderStats(){
  const {f,t}=getStatsRange();
  const counts=getRangeCounts(f,t);
  const maxC=Math.max(...Object.values(counts),1);
  const fairShare=(t-f+1)*4/EMPLOYEES.length;
  const fd=ALL_DAYS[f],td=ALL_DAYS[t];
  return`<div class="card">
    <div style="font-size:14px;font-weight:800;margin-bottom:10px">📊 عداد الـ OnCall</div>
    <div style="display:flex;gap:4px;margin-bottom:10px;background:#f3f4f6;border-radius:8px;padding:3px">
      ${[{k:'week',l:'أسبوع'},{k:'2weeks',l:'أسبوعان'},{k:'multiweek',l:'أسابيع'},{k:'range',l:'فترة'}].map(m=>`
        <button onclick="setStatsMode('${m.k}')" style="flex:1;padding:5px 2px;border-radius:6px;border:none;font-size:11px;font-weight:${S.statsMode===m.k?700:400};background:${S.statsMode===m.k?'white':'transparent'};color:${S.statsMode===m.k?'#0d7a5f':'#6b7280'};box-shadow:${S.statsMode===m.k?'0 1px 3px rgba(0,0,0,.1)':'none'}">${m.l}</button>`).join('')}
    </div>
    ${S.statsMode==='range'?`<div style="margin-bottom:10px;display:flex;flex-direction:column;gap:6px">
      <select onchange="S.statsFrom=Number(this.value);renderAll()" style="width:100%;padding:6px 10px;border-radius:7px;border:1.5px solid #e5e7eb;font-size:11px;color:#374151;font-family:'Tajawal',sans-serif">
        ${ALL_DAYS.map(d=>`<option value="${d.idx}" ${d.idx===S.statsFrom?'selected':''}>${d.day} ${d.month} – ${d.dayShort}</option>`).join('')}
      </select>
      <div style="text-align:center;font-size:11px;color:#9ca3af">إلى</div>
      <select onchange="S.statsTo=Number(this.value);renderAll()" style="width:100%;padding:6px 10px;border-radius:7px;border:1.5px solid #e5e7eb;font-size:11px;color:#374151;font-family:'Tajawal',sans-serif">
        ${ALL_DAYS.filter(d=>d.idx>=S.statsFrom).map(d=>`<option value="${d.idx}" ${d.idx===S.statsTo?'selected':''}>${d.day} ${d.month} – ${d.dayShort}</option>`).join('')}
      </select>
    </div>`:''}
    ${S.statsMode==='multiweek'?`<div style="margin-bottom:10px;display:flex;gap:4px;flex-wrap:wrap">
      ${WEEK_NUMS.map(wn=>`<button onclick="toggleStatsWeek(${wn})" style="padding:4px 8px;border-radius:6px;border:1.5px solid ${S.statsSelWeeks.includes(wn)?'#0d7a5f':'#e5e7eb'};background:${S.statsSelWeeks.includes(wn)?'#daf0e8':'white'};color:${S.statsSelWeeks.includes(wn)?'#0d7a5f':'#555'};font-size:11px;font-weight:${S.statsSelWeeks.includes(wn)?700:400}">أ${wn}</button>`).join('')}
    </div>`:''}
    <div style="font-size:10px;color:#9ca3af;margin-bottom:10px;padding:5px 8px;background:#f9fafb;border-radius:6px">
      ${fd?.day} ${fd?.month} – ${td?.day} ${td?.month} • متوسط: <strong style="color:#0d7a5f">${fairShare.toFixed(1)}</strong>
    </div>
    ${EMPLOYEES.map(emp=>{
      const cnt=counts[emp],over=cnt>fairShare+0.5,hasV=(S.vac[emp]||[]).length>0;
      const pct=maxC>0?(cnt/maxC)*100:0;
      return`<div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <div style="display:flex;align-items:center;gap:3px"><span style="font-size:11px;color:#374151;font-weight:500">${fn(emp)}</span>${hasV?'<span style="font-size:10px">🏖️</span>':''}</div>
          <span style="font-size:11px;font-weight:800;color:${over?'#d97706':'#0d7a5f'};background:${over?'#fef3c7':'#daf0e8'};padding:1px 6px;border-radius:5px">${cnt%1===0?cnt:cnt.toFixed(1)}</span>
        </div>
        <div style="height:5px;background:#f3f4f6;border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${over?'#f59e0b':'#0d7a5f'};border-radius:3px"></div></div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderAll(){render();}

/* ════════════════════════════════════════
   ACTIONS
════════════════════════════════════════ */
function selDay(idx){S.selDay=idx;render();}
function prevWeek(){if(S.curWeek>1){S.curWeek--;S.selDay=WEEKS_MAP[S.curWeek][WEEKS_MAP[S.curWeek].length-1].idx;render();}}
function nextWeek(){if(S.curWeek<WEEK_NUMS[WEEK_NUMS.length-1]){S.curWeek++;S.selDay=WEEKS_MAP[S.curWeek][0].idx;render();}}
function setStatsMode(m){S.statsMode=m;if(m==='multiweek')S.statsSelWeeks=[S.curWeek];render();}
function toggleStatsWeek(wn){S.statsSelWeeks=S.statsSelWeeks.includes(wn)?S.statsSelWeeks.filter(x=>x!==wn):[...S.statsSelWeeks,wn];render();}

function toggleManager(){
  const day=S.schedule[S.selDay];
  const np=!day.managerPresent;
  const tmpSch={...S.schedule,[S.selDay]:{...day,managerPresent:np}};
  S.schedule={...S.schedule,[S.selDay]:{...day,managerPresent:np,oncall:suggest(S.selDay,np,tmpSch)}};
  scheduleSave();render();
}
function resetDay(){
  const day=S.schedule[S.selDay];
  S.schedule={...S.schedule,[S.selDay]:{...day,oncall:suggest(S.selDay,day.managerPresent)}};
  scheduleSave();render();
}
function removeOncall(emp){
  const day=S.schedule[S.selDay];
  S.schedule={...S.schedule,[S.selDay]:{...day,oncall:day.oncall.filter(e=>e!==emp)}};
  scheduleSave();render();
}
function addOncall(emp){
  const day=S.schedule[S.selDay];
  const needed=day.managerPresent?5:4;
  if(!day.oncall.includes(emp)&&day.oncall.length<needed){
    S.schedule={...S.schedule,[S.selDay]:{...day,oncall:[...day.oncall,emp]}};
    scheduleSave();render();
  }
}
function resetAll(){
  if(!confirm('هل تريد مسح جميع البيانات والبدء من جديد؟'))return;
  S.vac={};S.schedule=buildInit();S.clinicAssign={};S.selDay=0;S.curWeek=1;
  fbSave({vac:{},schedule:S.schedule,clinicAssign:{},selDay:0,curWeek:1});
  render();
}

    const vd=S.vacDraft[emp]||[];

        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:30px;height:30px;border-radius:50%;background:${vd.length?'#fde68a':'#e5e7eb'};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:${vd.length?'#92400e':'#6b7280'}">${fn(emp)[0]}</div>
          <div>
            <div style="font-size:13px;font-weight:700">${emp}</div>
            ${vd.length?`<div style="font-size:10px;color:#d97706;margin-top:1px">إجازة ${vd.length} ${vd.length===1?'يوم':'أيام'}: ${vd.sort((a,b)=>a-b).map(i=>`${ALL_DAYS[i].day} ${ALL_DAYS[i].month}`).join('، ')}</div>`:''}

          ${vd.length?`<button onclick="event.stopPropagation();clearVacEmp('${emp}')" style="background:#fee2e2;border:none;border-radius:6px;padding:3px 8px;font-size:11px;color:#b91c1c;font-weight:600;font-family:'Tajawal',sans-serif;cursor:pointer">مسح</button>`:''}
          <span style="color:#9ca3af;font-size:11px">${open?'▲':'▼'}</span>
        </div>
      </div>
      ${open?`<div style="padding:10px 14px;border-top:1px solid #e5e7eb;background:white">
        ${WEEK_NUMS.map(wn=>`<div style="margin-bottom:10px">
          <div style="font-size:10px;color:#9ca3af;font-weight:600;margin-bottom:5px">الأسبوع ${wn} — ${weekDateRange(wn)}</div>

          </div>
        </div>`).join('')}
      </div>`:''}
    </div>`;
  }).join('');

function toggleVacEmp(emp){S.vacOpenEmp=S.vacOpenEmp===emp?null:emp;renderVacModal();}
function toggleVacDay(emp,idx){
  const arr=S.vacDraft[emp]||[];
  S.vacDraft[emp]=arr.includes(idx)?arr.filter(x=>x!==idx):[...arr,idx];
  renderVacModal();

function clearVacEmp(emp){S.vacDraft[emp]=[];renderVacModal();}
function saveVacModal(){
  S.vac={};EMPLOYEES.forEach(e=>{if((S.vacDraft[e]||[]).length)S.vac[e]=S.vacDraft[e];});

function openClinicPicker(emp,preNum){

function closeClinicPicker(){document.getElementById('clinic-picker').classList.add('hidden');S.pickerEmp=null;}
function renderClinicPicker(){

  const assign=S.clinicAssign[S.selDay]||{};
  const clinicEmp={};Object.entries(assign).forEach(([e,c])=>clinicEmp[c]=e);
  document.getElementById('clinic-picker-label').innerHTML=emp?`اختر رقم عيادة <strong>أ. ${fn(emp)}</strong>`:'اختر الطبيب أولاً';
  document.getElementById('clinic-picker-grid').innerHTML=CLINIC_NUMS.map(num=>{
    const takenBy=clinicEmp[num];
    const isMine=emp&&assign[emp]===num;
    const isTaken=takenBy&&takenBy!==emp;
    return`<button onclick="assignClinic(${num})" style="padding:10px 4px;border-radius:9px;border:2px solid ${isMine?'#0d7a5f':isTaken?'#fca5a5':'#e5e7eb'};background:${isMine?'#daf0e8':isTaken?'#fff1f2':'white'};color:${isMine?'#0d7a5f':isTaken?'#b91c1c':'#374151'};font-weight:${isMine?800:500};font-size:13px;line-height:1.3;font-family:'Tajawal',sans-serif;cursor:pointer">
      ع${num}${isTaken?`<div style="font-size:9px;margin-top:2px">${fn(takenBy)}</div>`:''}${isMine?`<div style="font-size:9px;margin-top:2px">✓</div>`:''}
    </button>`;
  }).join('');
  const removeBtn=document.getElementById('clinic-picker-remove');
  if(emp&&assign[emp]){removeBtn.classList.remove('hidden');}else{removeBtn.classList.add('hidden');}
}
function assignClinic(num){
  if(!S.pickerEmp)return;
  const emp=S.pickerEmp;
  const assign={...(S.clinicAssign[S.selDay]||{})};
  // unassign anyone else from this clinic
  Object.keys(assign).forEach(e=>{if(assign[e]===num&&e!==emp)delete assign[e];});
  assign[emp]=num;
  S.clinicAssign={...S.clinicAssign,[S.selDay]:assign};
  closeClinicPicker();
  scheduleSave();render();
}
function clinicPickerRemove(){
  if(!S.pickerEmp)return;
  const assign={...(S.clinicAssign[S.selDay]||{})};
  delete assign[S.pickerEmp];
  S.clinicAssign={...S.clinicAssign,[S.selDay]:assign};
  closeClinicPicker();
  scheduleSave();render();
}

/* ════════════════════════════════════════
   PDF MODAL
════════════════════════════════════════ */
function openPdfModal(){
  document.getElementById('pdf-modal').classList.remove('hidden');
  renderPdfModal();
}
function closePdfModal(){document.getElementById('pdf-modal').classList.add('hidden');}
function getPdfDays(){
  const p=S.pdfPeriod,i=S.pdfSelIdx;
  if(p==='day')return[ALL_DAYS[i]];
  if(p==='2days')return ALL_DAYS.slice(i,i+2);
  if(p==='week'){const wn=ALL_DAYS[i]?.weekNum;return WEEKS_MAP[wn]||[];}
  if(p==='month'){const mn=ALL_DAYS[i]?.monthNum;return ALL_DAYS.filter(d=>d.monthNum===mn);}
  return[];
}
function renderPdfModal(){
  const days=getPdfDays();
  const first=days[0],last=days[days.length-1];
  const preview=days.length===1?`${first?.dayName} ${first?.day} ${first?.month}`:`${first?.day} ${first?.month} – ${last?.day} ${last?.month}`;
  document.getElementById('pdf-modal-body').innerHTML=`
  <div class="card" style="margin-bottom:12px">
    <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:#374151">📋 نوع التقرير</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${[{k:'day',l:'📄 يومي'},{k:'2days',l:'📄 يومان'},{k:'week',l:'📅 أسبوعي'},{k:'month',l:'📆 شهري'}].map(p=>`
        <button onclick="S.pdfPeriod='${p.k}';renderPdfModal()" style="flex:1;min-width:100px;padding:10px 8px;border-radius:9px;border:2px solid ${S.pdfPeriod===p.k?'#0d7a5f':'#e5e7eb'};background:${S.pdfPeriod===p.k?'#daf0e8':'white'};color:${S.pdfPeriod===p.k?'#0d7a5f':'#555'};font-size:13px;font-weight:${S.pdfPeriod===p.k?700:400};font-family:'Tajawal',sans-serif">${p.l}</button>`).join('')}
    </div>
  </div>
  <div class="card" style="margin-bottom:12px">
    <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:#374151">📅 اختر الفترة</div>
    ${S.pdfPeriod==='day'||S.pdfPeriod==='2days'?`<select onchange="S.pdfSelIdx=Number(this.value);renderPdfModal()" style="width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #e5e7eb;font-size:13px;background:white;color:#374151;font-family:'Tajawal',sans-serif">
      ${ALL_DAYS.map(d=>`<option value="${d.idx}" ${d.idx===S.pdfSelIdx?'selected':''}>${d.dayName} – ${d.day} ${d.month} ${d.year}</option>`).join('')}
    </select>`:''}
    ${S.pdfPeriod==='week'?`<div style="display:flex;gap:6px;flex-wrap:wrap">
      ${WEEK_NUMS.map(wn=>{const cur=ALL_DAYS[S.pdfSelIdx]?.weekNum;return`<button onclick="S.pdfSelIdx=${WEEKS_MAP[wn][0].idx};renderPdfModal()" style="flex:1;min-width:80px;padding:8px 6px;border-radius:8px;border:2px solid ${cur===wn?'#0d7a5f':'#e5e7eb'};background:${cur===wn?'#daf0e8':'white'};color:${cur===wn?'#0d7a5f':'#555'};font-size:11px;font-weight:${cur===wn?700:400};line-height:1.4;text-align:center;font-family:'Tajawal',sans-serif;cursor:pointer">أسبوع ${wn}<br><span style="font-size:9px;opacity:.7">${weekDateRange(wn)}</span></button>`;}).join('')}
    </div>`:''}
    ${S.pdfPeriod==='month'?`<div style="display:flex;gap:6px;flex-wrap:wrap">
      ${[...new Set(ALL_DAYS.map(d=>d.monthNum))].map(mn=>{const cur=ALL_DAYS[S.pdfSelIdx]?.monthNum;const yr=ALL_DAYS.find(d=>d.monthNum===mn)?.year;return`<button onclick="S.pdfSelIdx=${ALL_DAYS.find(d=>d.monthNum===mn).idx};renderPdfModal()" style="flex:1;min-width:90px;padding:9px 8px;border-radius:8px;border:2px solid ${cur===mn?'#0d7a5f':'#e5e7eb'};background:${cur===mn?'#daf0e8':'white'};color:${cur===mn?'#0d7a5f':'#555'};font-size:13px;font-weight:${cur===mn?700:400};font-family:'Tajawal',sans-serif;cursor:pointer">${AR_MONTHS[mn]} ${yr}</button>`;}).join('')}
    </div>`:''}
    <div style="margin-top:10px;padding:8px 12px;background:#f0fdf4;border-radius:8px;font-size:12px;color:#0d7a5f;font-weight:600">📄 ${preview} (${days.length} يوم)</div>
  </div>
  <div class="card" style="margin-bottom:12px">
    <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:#374151">✏️ عنوان التقرير</div>
    <input value="${S.pdfHeader}" oninput="S.pdfHeader=this.value" style="width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #e5e7eb;font-size:13px;color:#374151"/>
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:#374151">📝 ملاحظات (اختياري)</div>
    <textarea oninput="S.pdfNotes=this.value" rows="3" placeholder="أي ملاحظات تظهر في أعلى التقرير..." style="width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #e5e7eb;font-size:13px;resize:vertical;color:#374151;line-height:1.6">${S.pdfNotes}</textarea>
  </div>`;
}

function doPrint(){
  const days=getPdfDays();
  if(!days.length)return;
  const periodLabel={day:'يومي','2days':'يومان',week:'أسبوعي',month:'شهري'}[S.pdfPeriod];
  const f=days[0],l=days[days.length-1];
  const dateRange=days.length===1?`${f.dayName} ${f.day} ${f.month} ${f.year}`:`${f.day} ${f.month} – ${l.day} ${l.month} ${f.year}`;
  const rows=days.map(d=>{
    const s=S.schedule[d.idx]||{oncall:[],managerPresent:false};
    const oncall=s.oncall||[];
    const oncallSet=new Set(oncall);
    const mp=s.managerPresent;
    const assign=S.clinicAssign[d.idx]||{};
    const cEmp={};Object.entries(assign).forEach(([e,c])=>cEmp[c]=e);
    const absent=EMPLOYEES.filter(e=>!isPresent(e,d.idx));
    const clinicRows=CLINIC_NUMS.map(num=>{
      const emp=cEmp[num]||(mp&&assign[MANAGER]===num?MANAGER:null);
      return`<tr><td style="padding:5px 10px;border:1px solid #e5e7eb;text-align:center;font-weight:700;color:#0d7a5f;font-size:13px;width:60px">ع${num}</td><td style="padding:5px 10px;border:1px solid #e5e7eb;font-size:13px">${emp?`أ. ${fn(emp)}`:'<span style="color:#d1d5db">—</span>'}</td></tr>`;
    }).join('');
    return`<div style="margin-bottom:14px;page-break-inside:avoid">
      <div style="background:#0d7a5f;color:white;padding:8px 14px;border-radius:8px 8px 0 0;display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:15px;font-weight:800">${d.dayName} ${d.day} ${d.month} ${d.year}</div>
        <div style="font-size:11px;opacity:.8">الأسبوع ${d.weekNum}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 8px 8px;overflow:hidden">
        <div style="border-left:1px solid #e5e7eb">
          <div style="background:#f0fdf4;padding:6px 10px;font-size:11px;font-weight:700;color:#0d7a5f;border-bottom:1px solid #e5e7eb">🏥 توزيع العيادات</div>
          <table style="width:100%;border-collapse:collapse">${clinicRows}</table>
        </div>
        <div>
          <div style="background:#eff6ff;padding:6px 10px;font-size:11px;font-weight:700;color:#1e40af;border-bottom:1px solid #e5e7eb">📞 OnCall</div>
          <div style="padding:10px;font-size:12px;line-height:2">${oncall.map(e=>`<div style="padding:3px 0;border-bottom:1px dashed #f3f4f6">أ. ${fn(e)}</div>`).join('')}</div>
          ${absent.length?`<div style="background:#fef9c3;padding:6px 10px;font-size:11px;border-top:1px solid #e5e7eb">🏖️ إجازة: ${absent.map(e=>fn(e)).join('، ')}</div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('print-area').innerHTML=`
    <div style="font-family:'Tajawal',sans-serif;direction:rtl;color:#1a1a1a">
      <div style="border-bottom:3px solid #0d7a5f;padding-bottom:12px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-end">
        <div>
          <div style="font-size:20px;font-weight:800;color:#0d7a5f">🦷 جدول توزيع العيادات ومناوبة OnCall</div>
          <div style="font-size:13px;color:#6b7280;margin-top:4px">${S.pdfHeader}</div>
        </div>
        <div style="text-align:left;font-size:12px;color:#6b7280">
          <div>الفترة: <strong>${periodLabel}</strong></div>
          <div>${dateRange}</div>
          <div>طُبع: ${new Date().toLocaleDateString('ar-SA')}</div>
        </div>
      </div>
      ${S.pdfNotes?`<div style="background:#fef9e7;border:1.5px solid #fde68a;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#78350f;white-space:pre-wrap">${S.pdfNotes}</div>`:''}
      ${rows}
      <div style="margin-top:14px;border-top:1px solid #e5e7eb;padding-top:8px;font-size:10px;color:#9ca3af">قسم صحة الفم والأسنان • 4:00م – 11:00م • 10 عيادات</div>
    </div>`;
  window.print();
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
const LS_KEY='oncall_v1';
function lsLoad(){try{const d=localStorage.getItem(LS_KEY);return d?JSON.parse(d):null;}catch(e){return null;}}
function lsSave(data){try{localStorage.setItem(LS_KEY,JSON.stringify(data));}catch(e){}}

function applyData(data){
  if(!data)return;
  if(data.vac)S.vac=data.vac;
  if(data.schedule)S.schedule=data.schedule;
  if(data.clinicAssign)S.clinicAssign=data.clinicAssign;
  if(data.selDay!=null)S.selDay=data.selDay;
  if(data.curWeek!=null)S.curWeek=data.curWeek;
}

function showApp(){
  if(!Object.keys(S.schedule).length)S.schedule=buildInit();
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  render();
}

async function init(){
  const isLocal=location.protocol==='file:';

  // 1. Load from localStorage immediately (works local + online)
  const lsData=lsLoad();
  if(lsData){applyData(lsData);}

  // 2. Show app right away — no waiting
  showApp();

  // 3. If online, also try Firebase in background and merge
  if(!isLocal){
    fbLoad().then(fbData=>{
      if(fbData){
        applyData(fbData);
        // also update localStorage with Firebase data
        lsSave({vac:S.vac,schedule:S.schedule,clinicAssign:S.clinicAssign,selDay:S.selDay,curWeek:S.curWeek});
        render();
      }
    }).catch(()=>{});
  }
}
init();
</script>
