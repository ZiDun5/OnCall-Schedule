<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:#eef7f4;min-height:100vh;padding:12px;font-size:14px}
button{font-family:'Tajawal',sans-serif;cursor:pointer}
input,textarea,select{font-family:'Tajawal',sans-serif}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#0d7a5f55;border-radius:3px}
.card{background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:14px}

<!-- COPY DAY MODAL -->
<div id="copy-modal" class="modal-overlay hidden">

      <div><div style="font-size:16px;font-weight:800;color:#0d7a5f">📋 نسخ جدول اليوم</div><div style="font-size:11px;color:#9ca3af;margin-top:2px" id="copy-modal-sub"></div></div>
      <button onclick="closeCopyModal()" style="background:#f3f4f6;border:none;border-radius:8px;width:32px;height:32px;font-size:16px;color:#6b7280">✕</button>

    </div>

</div>

<script>
/* ════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════ */
const EMPLOYEES=[
  "وضحى العتيبي","زريفة العنزي","سلمى الكناني","ختام المرشد",
  "منيفة المطيري","سارة الشهراني","سلطانة الايداء","نوال الطياوي",
  "فاطمة الحربي","حجاب العنزي","حمدان العتيبي","ماجد الجبرين",
  "محمد الدوسري","ثامر العثمان"
];
const MANAGER="زياد الحربي";
const CLINIC_NUMS=[8,9,13,14,15,16,17,18,19,20];
const AR_DAYS=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
const AR_DAYS_S=["أحد","اثنين","ثلاثاء","أربعاء","خميس","جمعة","سبت"];
const AR_MONTHS=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const fn=n=>n.split(" ")[0];

/* ════════════════════════════════════════
   FIREBASE
════════════════════════════════════════ */
const FB_URL='https://oncall-schedule-cfbf3-default-rtdb.europe-west1.firebasedatabase.app/data.json';
async function fbLoad(){
  try{
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),8000);
    const r=await fetch(FB_URL,{signal:ctrl.signal});
    clearTimeout(tid);
    if(!r.ok)return null;
    return await r.json();
  }catch(e){return null;}
}
async function fbSave(data){
  try{await fetch(FB_URL,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});}catch(e){}
}

/* ════════════════════════════════════════
   GENERATE DAYS
════════════════════════════════════════ */
function generateAllDays(numWeeks=9){
  const days=[];const d=new Date(2026,2,25);
  let weekNum=1,idx=0;
  while(weekNum<=numWeeks){
    const dow=d.getDay();
    if(dow===0&&idx>0){weekNum++;if(weekNum>numWeeks)break;}
    if(dow<=4){
      days.push({date:new Date(d),dayName:AR_DAYS[dow],dayShort:AR_DAYS_S[dow],
        weekNum,idx:idx++,day:d.getDate(),month:AR_MONTHS[d.getMonth()],
        monthNum:d.getMonth(),year:d.getFullYear()});
    }
    d.setDate(d.getDate()+1);
  }
  return days;
}
const ALL_DAYS=generateAllDays(9);
function getWeeksMap(){const m={};ALL_DAYS.forEach(d=>{if(!m[d.weekNum])m[d.weekNum]=[];m[d.weekNum].push(d);});return m;}
const WEEKS_MAP=getWeeksMap();
const WEEK_NUMS=Object.keys(WEEKS_MAP).map(Number).sort((a,b)=>a-b);
function weekDateRange(wn){
  const days=WEEKS_MAP[wn];const f=days[0],l=days[days.length-1];
  if(f.monthNum===l.monthNum)return`${f.day} – ${l.day} ${f.month} ${f.year}`;
  return`${f.day} ${f.month} – ${l.day} ${l.month} ${f.year}`;
}

/* ════════════════════════════════════════
   HELPERS
════════════════════════════════════════ */
function getClinicName(num){return(S.clinicNames&&S.clinicNames[num])||`ع${num}`;}
function getOncallNeeded(dayIdx){
  const day=S.schedule[dayIdx]||{};
  if(S.oncallNeeded[dayIdx]!=null)return S.oncallNeeded[dayIdx];
  return day.managerPresent?5:4;
}
function getEmpType(dayIdx,emp){return(S.empType[dayIdx]||{})[emp]||'full';}
function getPairOf(dayIdx,emp){return(S.shiftPairs[dayIdx]||{})[emp]||null;}

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let S={
  vac:{},
  schedule:{},
  clinicAssign:{},    // {dayIdx:{empName:clinicNum}} primary
  coverage:{},        // {dayIdx:{empName:clinicNum}} secondary
  clinicNames:{},     // {8:'name',...}
  empType:{},         // {dayIdx:{empName:'full'|'shift'}}
  shiftPairs:{},      // {dayIdx:{emp1:emp2, emp2:emp1}}
  oncallNeeded:{},    // {dayIdx:number}
  empNotes:{},        // {dayIdx:{empName:'note'}}
  selDay:0,
  curWeek:1,
  statsMode:'week',
  statsFrom:0,
  statsTo:ALL_DAYS.length-1,
  statsSelWeeks:[1],
  pdfPeriod:'week',
  pdfSelIdx:0,
  pdfNotes:'',
  pdfHeader:'قسم صحة الفم والأسنان',
  vacDraft:{},
  vacOpenEmp:null,
  pickerEmp:null,
  pickerMode:'primary',
  pairPickerEmp:null,
  settingsDraft:{},
  savedMsg:'',
};

/* ════════════════════════════════════════
   SCHEDULE LOGIC
════════════════════════════════════════ */
function isPresent(emp,dayIdx){return!(S.vac[emp]||[]).includes(dayIdx);}

function getEffectiveCounts(upTo){
  const c={};EMPLOYEES.forEach(e=>c[e]=0);
  for(let d=0;d<upTo;d++){
    (S.schedule[d]?.oncall||[]).forEach(e=>{if(c[e]!==undefined)c[e]++;});
    const absent=EMPLOYEES.filter(e=>!isPresent(e,d));
    if(absent.length){
      const need=getOncallNeeded(d);
      const avg=(EMPLOYEES.length-absent.length)>0?need/(EMPLOYEES.length-absent.length):0;
      absent.forEach(e=>{c[e]=(c[e]||0)+avg;});
    }
  }
  return c;
}

function getRangeCounts(fromIdx,toIdx){
  const c={};EMPLOYEES.forEach(e=>c[e]=0);
  for(let d=fromIdx;d<=Math.min(toIdx,ALL_DAYS.length-1);d++){
    (S.schedule[d]?.oncall||[]).forEach(e=>{if(c[e]!==undefined)c[e]++;});
    const absent=EMPLOYEES.filter(e=>!isPresent(e,d));
    if(absent.length){
      const need=getOncallNeeded(d);
      const avg=(EMPLOYEES.length-absent.length)>0?need/(EMPLOYEES.length-absent.length):0;
      absent.forEach(e=>{c[e]=(c[e]||0)+avg;});
    }
  }
  return c;
}

function suggest(dayIdx,managerPresent,scheduleRef){
  const sch=scheduleRef||S.schedule;
  const needed=managerPresent?5:4;
  const c={};EMPLOYEES.forEach(e=>c[e]=0);
  for(let d=0;d<dayIdx;d++){
    (sch[d]?.oncall||[]).forEach(e=>{if(c[e]!==undefined)c[e]++;});
    const absent=EMPLOYEES.filter(e=>!isPresent(e,d));
    if(absent.length){
      const need=sch[d]?.managerPresent?5:4;
      const avg=(EMPLOYEES.length-absent.length)>0?need/(EMPLOYEES.length-absent.length):0;
      absent.forEach(e=>{c[e]=(c[e]||0)+avg;});
    }
  }
  const prev=new Set(dayIdx>0?(sch[dayIdx-1]?.oncall||[]):[]);
  const avail=EMPLOYEES.filter(e=>isPresent(e,dayIdx));
  const sorted=[...avail].sort((a,b)=>c[a]-c[b]||EMPLOYEES.indexOf(a)-EMPLOYEES.indexOf(b));
  return[...sorted.filter(e=>!prev.has(e)),...sorted.filter(e=>prev.has(e))].slice(0,needed);
}

function buildInit(){
  const s={};
  for(let i=0;i<ALL_DAYS.length;i++)
    s[i]={oncall:suggest(i,false,s),managerPresent:false};
  return s;
}

/* ════════════════════════════════════════
   SAVE / LOAD
════════════════════════════════════════ */
const LS_KEY='oncall_v2';
function lsLoad(){try{const d=localStorage.getItem(LS_KEY);return d?JSON.parse(d):null;}catch(e){return null;}}
function lsSave(data){try{localStorage.setItem(LS_KEY,JSON.stringify(data));}catch(e){}}

let saveTimer=null;
function scheduleSave(){
  if(saveTimer)clearTimeout(saveTimer);
  S.savedMsg='جاري الحفظ...';
  updateSavedMsg();
  saveTimer=setTimeout(async()=>{
    const _d={vac:S.vac,schedule:S.schedule,clinicAssign:S.clinicAssign,
      coverage:S.coverage,clinicNames:S.clinicNames,empType:S.empType,
      shiftPairs:S.shiftPairs,oncallNeeded:S.oncallNeeded,empNotes:S.empNotes,
      selDay:S.selDay,curWeek:S.curWeek};
    lsSave(_d);
    if(location.protocol!=='file:')await fbSave(_d);
    S.savedMsg='✓ محفوظ';
    updateSavedMsg();
    setTimeout(()=>{S.savedMsg='';updateSavedMsg();},2000);
  },1500);
}
function updateSavedMsg(){
  const el=document.getElementById('saved-msg');
  if(!el)return;
  if(S.savedMsg){el.textContent=S.savedMsg;el.style.display='inline-block';}
  else el.style.display='none';
}

/* ════════════════════════════════════════
   WARN
════════════════════════════════════════ */
function warnLevel(emp,dayIdx){
  const prev=new Set(dayIdx>0?(S.schedule[dayIdx-1]?.oncall||[]):[]);
  if(prev.has(emp))return'red';
  const cntBefore=getEffectiveCounts(dayIdx);
  let slotsBefore=0;
  for(let d=0;d<dayIdx;d++)slotsBefore+=getOncallNeeded(d);
  const avg=slotsBefore/14;
  if(cntBefore[emp]>avg+1)return'yellow';
  return'green';
}
const WC={
  red:{bg:'#fff1f2',border:'#fca5a5',dot:'#ef4444',text:'#b91c1c',tag:'📵 متتالي'},
  yellow:{bg:'#fefce8',border:'#fde047',dot:'#f59e0b',text:'#a16207',tag:'⚠️ زائد'},
  green:{bg:'#f0fdf4',border:'#86efac',dot:'#22c55e',text:'#166534',tag:'✅ صالح'},
};

/* ════════════════════════════════════════
   RENDER CLINIC STAFF CARD
════════════════════════════════════════ */
function renderEmpClinicCard(emp,assign,cov,oncallSet,needed,dayIdx,isManager){
  const pNum=assign[emp];
  const cNum=cov[emp];
  const eType=isManager?'full':getEmpType(dayIdx,emp);
  const pair=isManager?null:getPairOf(dayIdx,emp);
  const oncallCount=(S.schedule[dayIdx]?.oncall||[]).length;
  const canAdd=oncallCount<needed&&!oncallSet.has(emp);

  const clinicBtns=`
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:6px">
      <span onclick="openClinicPicker('${emp}','primary')" title="العيادة الأساسية" style="cursor:pointer;background:${pNum?'#0d7a5f':'#e5e7eb'};color:${pNum?'white':'#9ca3af'};border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700">${pNum?getClinicName(pNum):'+ عيادة'}</span>
      <span onclick="openClinicPicker('${emp}','coverage')" title="يغطي عيادة" style="cursor:pointer;background:${cNum?'#eff6ff':'#f9fafb'};color:${cNum?'#1e40af':'#c4c4c4'};border-radius:6px;padding:3px 8px;font-size:11px;font-weight:${cNum?700:400};border:1.5px dashed ${cNum?'#93c5fd':'#e2e8f0'}">${cNum?'🔄 '+getClinicName(cNum):'يغطي...'}</span>
    </div>`;

  const typeToggle=isManager?'':`
    <div style="display:flex;gap:4px;margin-bottom:4px">
      <button onclick="setEmpType('${emp.replace(/'/g,"\\'")}','full')" style="flex:1;padding:3px 0;border-radius:5px;border:1.5px solid ${eType==='full'?'#0d7a5f':'#e5e7eb'};background:${eType==='full'?'#daf0e8':'white'};color:${eType==='full'?'#0d7a5f':'#9ca3af'};font-size:10px;font-weight:${eType==='full'?700:400};font-family:'Tajawal',sans-serif">كامل</button>
      <button onclick="setEmpType('${emp.replace(/'/g,"\\'")}','shift')" style="flex:1;padding:3px 0;border-radius:5px;border:1.5px solid ${eType==='shift'?'#f59e0b':'#e5e7eb'};background:${eType==='shift'?'#fef3c7':'white'};color:${eType==='shift'?'#b45309':'#9ca3af'};font-size:10px;font-weight:${eType==='shift'?700:400};font-family:'Tajawal',sans-serif">شيفت</button>
    </div>`;

  const note=(S.empNotes[dayIdx]||{})[emp]||'';
  const noteField=`<input value="${note.replace(/"/g,'&quot;')}" onchange="setEmpNote('${emp.replace(/'/g,"\\'")}',this.value)" placeholder="💬 تعليق..." style="width:100%;margin-top:5px;padding:4px 8px;border-radius:6px;border:1px solid #e5e7eb;font-size:10px;color:#6b7280;font-family:'Tajawal',sans-serif;background:#fafafa;outline:none" onfocus="this.style.borderColor='#0d7a5f'" onblur="this.style.borderColor='#e5e7eb'"/>`;

  const pairBtn=(eType==='shift'&&!pair&&!isManager)?`<button onclick="openPairPicker('${emp.replace(/'/g,"\\'")}') " style="width:100%;margin-top:5px;padding:4px 0;background:#fff8e1;border:1.5px dashed #fcd34d;border-radius:6px;font-size:10px;color:#b45309;font-weight:600;font-family:'Tajawal',sans-serif">🔗 ربط شريك الشيفت</button>`:'';
  const unpairBtn=(pair&&!isManager)?`<button onclick="unpairEmp('${emp.replace(/'/g,"\\'")}') " style="font-size:9px;color:#b45309;background:transparent;border:none;padding:0;cursor:pointer;text-decoration:underline;font-family:'Tajawal',sans-serif">فك الربط</button>`:'';

  const nameRow=`
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:12px;font-weight:700;color:#374151">أ. ${fn(emp)}${isManager?` <span style="font-size:10px;color:#9ca3af;font-weight:400">رئيس</span>`:''}  ${unpairBtn}</div>
      ${canAdd&&!isManager?`<span onclick="addOncall('${emp.replace(/'/g,"\\'")}') " title="نقل لمجموعة ب" style="font-size:11px;color:#9ca3af;cursor:pointer;padding:2px 5px;border-radius:5px;background:#f3f4f6" onmouseenter="this.style.color='#1e40af';this.style.background='#eff6ff'" onmouseleave="this.style.color='#9ca3af';this.style.background='#f3f4f6'">📞</span>`:''}
    </div>`;

  return{nameRow,typeToggle,clinicBtns,pairBtn,noteField,eType};
}

/* ════════════════════════════════════════
   STATS PANEL
════════════════════════════════════════ */
function getStatsRange(){
  if(S.statsMode==='week'){const wd=WEEKS_MAP[S.curWeek]||[];return{f:wd[0]?.idx||0,t:wd[wd.length-1]?.idx||0};}
  if(S.statsMode==='2weeks'){const wn2=Math.min(S.curWeek+1,WEEK_NUMS[WEEK_NUMS.length-1]);const a=[...(WEEKS_MAP[S.curWeek]||[]),...(WEEKS_MAP[wn2]||[])];return{f:a[0]?.idx||0,t:a[a.length-1]?.idx||0};}
  if(S.statsMode==='multiweek'){const a=S.statsSelWeeks.flatMap(wn=>WEEKS_MAP[wn]||[]).sort((a,b)=>a.idx-b.idx);return a.length?{f:a[0].idx,t:a[a.length-1].idx}:{f:0,t:0};}
  return{f:S.statsFrom,t:S.statsTo};
}
function renderStats(){
  const {f,t}=getStatsRange();
  const counts=getRangeCounts(f,t);
  const maxC=Math.max(...Object.values(counts),1);
  const totalSlots=Object.values(S.oncallNeeded).reduce((s,v)=>s+v,0)+(t-f+1-Object.keys(S.oncallNeeded).filter(k=>k>=f&&k<=t).length)*4;
  const fairShare=totalSlots/EMPLOYEES.length;
  const fd=ALL_DAYS[f],td=ALL_DAYS[t];
  return`<div class="card">
    <div style="font-size:14px;font-weight:800;margin-bottom:10px">📊 عداد الـ OnCall</div>

    ${EMPLOYEES.map(emp=>{

/* ════════════════════════════════════════
   ACTIONS
════════════════════════════════════════ */
function selDay(idx){S.selDay=idx;render();}
function prevWeek(){if(S.curWeek>1){S.curWeek--;S.selDay=WEEKS_MAP[S.curWeek][WEEKS_MAP[S.curWeek].length-1].idx;render();}}
function nextWeek(){if(S.curWeek<WEEK_NUMS[WEEK_NUMS.length-1]){S.curWeek++;S.selDay=WEEKS_MAP[S.curWeek][0].idx;render();}}
function setStatsMode(m){S.statsMode=m;if(m==='multiweek')S.statsSelWeeks=[S.curWeek];render();}
function toggleStatsWeek(wn){S.statsSelWeeks=S.statsSelWeeks.includes(wn)?S.statsSelWeeks.filter(x=>x!==wn):[...S.statsSelWeeks,wn];render();}

function adjustNeeded(delta){
  const cur=getOncallNeeded(S.selDay);
  const next=Math.max(1,Math.min(EMPLOYEES.length,cur+delta));
  S.oncallNeeded={...S.oncallNeeded,[S.selDay]:next};
  scheduleSave();render();
}

function toggleManager(){
  const day=S.schedule[S.selDay];
  const np=!day.managerPresent;
  const tmpSch={...S.schedule,[S.selDay]:{...day,managerPresent:np}};
  S.schedule={...S.schedule,[S.selDay]:{...day,managerPresent:np,oncall:suggest(S.selDay,np,tmpSch)}};
  scheduleSave();render();
}
function resetDay(){
  const day=S.schedule[S.selDay];
  S.schedule={...S.schedule,[S.selDay]:{...day,oncall:suggest(S.selDay,day.managerPresent)}};
  scheduleSave();render();
}
function removeOncall(emp){
  const day=S.schedule[S.selDay];
  S.schedule={...S.schedule,[S.selDay]:{...day,oncall:day.oncall.filter(e=>e!==emp)}};
  scheduleSave();render();
}
function addOncall(emp){
  const day=S.schedule[S.selDay];
  const needed=getOncallNeeded(S.selDay);
  if(!day.oncall.includes(emp)&&day.oncall.length<needed){
    S.schedule={...S.schedule,[S.selDay]:{...day,oncall:[...day.oncall,emp]}};
    scheduleSave();render();
  }
}

/* emp type & pairs */
function setEmpType(emp,type){
  if(!S.empType[S.selDay])S.empType[S.selDay]={};
  S.empType[S.selDay][emp]=type;
  if(type==='full'){
    // Remove any pair
    const pair=getPairOf(S.selDay,emp);
    if(pair){
      const p={...(S.shiftPairs[S.selDay]||{})};
      delete p[emp];delete p[pair];
      S.shiftPairs={...S.shiftPairs,[S.selDay]:p};
    }
  }
  scheduleSave();render();
}
function openPairPicker(emp){
  S.pairPickerEmp=emp;
  document.getElementById('pair-picker').classList.remove('hidden');
  renderPairPicker();
}
function closePairPicker(){document.getElementById('pair-picker').classList.add('hidden');S.pairPickerEmp=null;}
function renderPairPicker(){
  const emp=S.pairPickerEmp;
  const day=S.schedule[S.selDay]||{oncall:[]};
  const oncallSet=new Set(day.oncall);
  const avail=EMPLOYEES.filter(e=>e!==emp&&isPresent(e,S.selDay)&&!oncallSet.has(e));
  document.getElementById('pair-picker-label').innerHTML=`اختر شريك الشيفت لـ <strong>أ. ${fn(emp)}</strong>`;
  document.getElementById('pair-picker-list').innerHTML=avail.map(e=>{
    const eType=getEmpType(S.selDay,e);
    const hasPair=getPairOf(S.selDay,e);
    return`<button onclick="setPair('${emp.replace(/'/g,"\\'")}','${e.replace(/'/g,"\\'")}') " style="width:100%;padding:10px 14px;border-radius:9px;border:1.5px solid ${eType==='shift'?'#fcd34d':'#e5e7eb'};background:${eType==='shift'?'#fffbeb':'white'};color:#374151;font-size:13px;font-weight:600;font-family:'Tajawal',sans-serif;text-align:right;display:flex;justify-content:space-between;align-items:center">
      <span>أ. ${e}</span>
      <span style="font-size:10px;color:${eType==='shift'?'#b45309':'#9ca3af'}">${eType==='shift'?(hasPair?'شيفت (مرتبط)':'شيفت'):'كامل'}</span>
    </button>`;
  }).join('')||'<div style="text-align:center;color:#9ca3af;font-size:12px;padding:20px">لا يوجد موظفون متاحون</div>';
}
function setPair(emp1,emp2){
  if(!S.shiftPairs[S.selDay])S.shiftPairs[S.selDay]={};
  if(!S.empType[S.selDay])S.empType[S.selDay]={};
  // Remove old pairs
  const oldPair1=getPairOf(S.selDay,emp1);
  const oldPair2=getPairOf(S.selDay,emp2);
  if(oldPair1&&oldPair1!==emp2)delete S.shiftPairs[S.selDay][oldPair1];
  if(oldPair2&&oldPair2!==emp1)delete S.shiftPairs[S.selDay][oldPair2];
  S.shiftPairs[S.selDay][emp1]=emp2;
  S.shiftPairs[S.selDay][emp2]=emp1;
  S.empType[S.selDay][emp1]='shift';
  S.empType[S.selDay][emp2]='shift';
  closePairPicker();
  scheduleSave();render();
}
function unpairEmp(emp){
  const pair=getPairOf(S.selDay,emp);
  if(!pair)return;
  const p={...(S.shiftPairs[S.selDay]||{})};
  delete p[emp];delete p[pair];
  S.shiftPairs={...S.shiftPairs,[S.selDay]:p};
  scheduleSave();render();
}

function setEmpNote(emp,val){
  if(!S.empNotes[S.selDay])S.empNotes[S.selDay]={};
  if(val.trim())S.empNotes[S.selDay][emp]=val.trim();
  else delete S.empNotes[S.selDay][emp];
  scheduleSave();
  // no full re-render to avoid losing focus
}

let copyTargets=new Set();
function openCopyModal(){
  copyTargets=new Set();
  document.getElementById('copy-modal').classList.remove('hidden');
  document.getElementById('copy-modal-sub').textContent=`نسخ من: ${ALL_DAYS[S.selDay].dayName} ${ALL_DAYS[S.selDay].day} ${ALL_DAYS[S.selDay].month}`;
  renderCopyModal();
}
function closeCopyModal(){document.getElementById('copy-modal').classList.add('hidden');copyTargets=new Set();}
function renderCopyModal(){
  const src=S.selDay;
  document.getElementById('copy-modal-body').innerHTML=`
    <div style="padding:10px;background:#eff6ff;border-radius:8px;border:1px solid #bfdbfe;font-size:12px;color:#1e40af;margin-bottom:14px">
      💡 اختر الأيام التي تريد نسخ الجدول إليها. سيتم نسخ: توزيع العيادات، التغطية، نوع الحضور، أزواج الشيفت، وعدد الاتصال.
    </div>
    <div style="font-size:12px;color:#6b7280;font-weight:600;margin-bottom:8px">اختر الأيام المستهدفة:</div>
    ${WEEK_NUMS.map(wn=>`
      <div style="margin-bottom:12px">
        <div style="font-size:11px;color:#9ca3af;font-weight:700;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #f3f4f6">الأسبوع ${wn} — ${weekDateRange(wn)}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${WEEKS_MAP[wn].map(dd=>{
            const isSrc=dd.idx===src;
            const isSel=copyTargets.has(dd.idx);
            return`<button onclick="toggleCopyTarget(${dd.idx})" ${isSrc?'disabled':''} style="padding:6px 10px;border-radius:8px;border:2px solid ${isSrc?'#e5e7eb':isSel?'#0d7a5f':'#e5e7eb'};background:${isSrc?'#f9fafb':isSel?'#daf0e8':'white'};color:${isSrc?'#d1d5db':isSel?'#0d7a5f':'#555'};font-size:12px;font-weight:${isSel?700:400};line-height:1.3;font-family:'Tajawal',sans-serif;cursor:${isSrc?'not-allowed':'pointer'}">
              ${isSrc?'📌 ':''}${dd.dayShort} ${dd.day} ${dd.month}
            </button>`;
          }).join('')}
        </div>
      </div>`).join('')}
    <div style="margin-top:10px;padding:8px 12px;background:#f9fafb;border-radius:8px;font-size:12px;color:#374151">
      <strong>${copyTargets.size}</strong> يوم محدد
    </div>`;
  document.getElementById('copy-confirm-btn').style.opacity=copyTargets.size>0?1:0.5;
}
function toggleCopyTarget(idx){
  if(copyTargets.has(idx))copyTargets.delete(idx);else copyTargets.add(idx);
  renderCopyModal();
}
function executeCopy(){
  if(copyTargets.size===0)return;
  const src=S.selDay;
  const srcOncallNeeded=S.oncallNeeded[src];
  copyTargets.forEach(tgt=>{
    // Copy oncall structure (keep target's own suggested oncall but copy needed count)
    if(srcOncallNeeded!=null)S.oncallNeeded[tgt]=srcOncallNeeded;
    // Copy clinic assignments
    S.clinicAssign[tgt]=JSON.parse(JSON.stringify(S.clinicAssign[src]||{}));
    S.coverage[tgt]=JSON.parse(JSON.stringify(S.coverage[src]||{}));
    S.empType[tgt]=JSON.parse(JSON.stringify(S.empType[src]||{}));
    S.shiftPairs[tgt]=JSON.parse(JSON.stringify(S.shiftPairs[src]||{}));
    S.empNotes[tgt]=JSON.parse(JSON.stringify(S.empNotes[src]||{}));
    // Copy oncall list too
    const srcDay=S.schedule[src]||{};
    if(!S.schedule[tgt])S.schedule[tgt]={oncall:[],managerPresent:false};
    S.schedule[tgt]={...S.schedule[tgt],oncall:[...(srcDay.oncall||[])],managerPresent:srcDay.managerPresent||false};
  });
  closeCopyModal();
  scheduleSave();render();
  alert(`✅ تم النسخ لـ ${copyTargets.size} يوم بنجاح`);
  copyTargets=new Set();
}

function resetAll(){
  if(!confirm('هل تريد مسح جميع البيانات والبدء من جديد؟'))return;
  const names=S.clinicNames;
  S.vac={};S.schedule=buildInit();S.clinicAssign={};S.coverage={};
  S.empType={};S.shiftPairs={};S.oncallNeeded={};S.selDay=0;S.curWeek=1;
  fbSave({vac:{},schedule:S.schedule,clinicAssign:{},coverage:{},clinicNames:names,
    empType:{},shiftPairs:{},oncallNeeded:{},selDay:0,curWeek:1});
  render();
}

   CLINIC PICKER
════════════════════════════════════════ */
function openClinicPicker(emp,mode){
  S.pickerEmp=emp||null;
  S.pickerMode=mode||'primary';
  document.getElementById('clinic-picker').classList.remove('hidden');
  renderClinicPicker();
}
function closeClinicPicker(){document.getElementById('clinic-picker').classList.add('hidden');S.pickerEmp=null;}
function renderClinicPicker(){
  const emp=S.pickerEmp;
  const assign=S.clinicAssign[S.selDay]||{};
  const cov=S.coverage[S.selDay]||{};
  const clinicEmp={};Object.entries(assign).forEach(([e,c])=>clinicEmp[c]=e);
  const isPrimary=S.pickerMode==='primary';
  const currentVal=isPrimary?assign[emp]:cov[emp];
  document.getElementById('clinic-picker-title').textContent=isPrimary?'🏥 العيادة الأساسية':'🔄 تغطية عيادة';
  document.getElementById('clinic-picker-label').innerHTML=emp?`<strong>أ. ${fn(emp)}</strong> — ${isPrimary?'العيادة الأساسية':'عيادة يغطيها بالتناوب'}`:'';
  document.getElementById('clinic-picker-tabs').innerHTML=`
    <button onclick="S.pickerMode='primary';renderClinicPicker()" style="flex:1;padding:6px 4px;border-radius:6px;border:none;font-size:12px;font-weight:${isPrimary?700:400};background:${isPrimary?'white':'transparent'};color:${isPrimary?'#0d7a5f':'#6b7280'};box-shadow:${isPrimary?'0 1px 3px rgba(0,0,0,.1)':'none'};font-family:'Tajawal',sans-serif;cursor:pointer">🏥 أساسية</button>
    <button onclick="S.pickerMode='coverage';renderClinicPicker()" style="flex:1;padding:6px 4px;border-radius:6px;border:none;font-size:12px;font-weight:${!isPrimary?700:400};background:${!isPrimary?'white':'transparent'};color:${!isPrimary?'#1e40af':'#6b7280'};box-shadow:${!isPrimary?'0 1px 3px rgba(0,0,0,.1)':'none'};font-family:'Tajawal',sans-serif;cursor:pointer">🔄 يغطي</button>`;
  document.getElementById('clinic-picker-grid').innerHTML=CLINIC_NUMS.map(num=>{
    const isMine=currentVal===num;
    const takenBy=isPrimary?clinicEmp[num]:null;
    const isTaken=takenBy&&takenBy!==emp;
    const ac=isPrimary?'#0d7a5f':'#1e40af';
    const ab=isPrimary?'#daf0e8':'#eff6ff';
    return`<button onclick="assignClinic(${num})" style="padding:9px 4px;border-radius:9px;border:2px solid ${isMine?ac:isTaken?'#fca5a5':'#e5e7eb'};background:${isMine?ab:isTaken?'#fff1f2':'white'};color:${isMine?ac:isTaken?'#b91c1c':'#374151'};font-weight:${isMine?800:500};font-size:11px;line-height:1.3;font-family:'Tajawal',sans-serif;cursor:pointer">
      ${getClinicName(num)}${isTaken?`<div style="font-size:9px;margin-top:1px;opacity:.8">${fn(takenBy)}</div>`:''}${isMine?`<div style="font-size:9px;margin-top:1px">✓</div>`:''}
    </button>`;
  }).join('');
  const removeBtn=document.getElementById('clinic-picker-remove');
  if(emp&&currentVal)removeBtn.classList.remove('hidden');else removeBtn.classList.add('hidden');
}
function assignClinic(num){
  if(!S.pickerEmp)return;
  const emp=S.pickerEmp;
  if(S.pickerMode==='primary'){
    const assign={...(S.clinicAssign[S.selDay]||{})};
    Object.keys(assign).forEach(e=>{if(assign[e]===num&&e!==emp)delete assign[e];});
    assign[emp]=num;
    S.clinicAssign={...S.clinicAssign,[S.selDay]:assign};
  } else {
    const cov={...(S.coverage[S.selDay]||{})};
    cov[emp]=num;
    S.coverage={...S.coverage,[S.selDay]:cov};
  }
  closeClinicPicker();scheduleSave();render();
}
function clinicPickerRemove(){
  if(!S.pickerEmp)return;
  const emp=S.pickerEmp;
  if(S.pickerMode==='primary'){
    const assign={...(S.clinicAssign[S.selDay]||{})};
    delete assign[emp];
    S.clinicAssign={...S.clinicAssign,[S.selDay]:assign};
  } else {
    const cov={...(S.coverage[S.selDay]||{})};
    delete cov[emp];
    S.coverage={...S.coverage,[S.selDay]:cov};
  }
  closeClinicPicker();scheduleSave();render();
}

/* ════════════════════════════════════════
   PDF
════════════════════════════════════════ */
function openPdfModal(){document.getElementById('pdf-modal').classList.remove('hidden');renderPdfModal();}
function closePdfModal(){document.getElementById('pdf-modal').classList.add('hidden');}
function getPdfDays(){
  const p=S.pdfPeriod,i=S.pdfSelIdx;
  if(p==='day')return[ALL_DAYS[i]];
  if(p==='2days')return ALL_DAYS.slice(i,i+2);
  if(p==='week'){const wn=ALL_DAYS[i]?.weekNum;return WEEKS_MAP[wn]||[];}
  if(p==='month'){const mn=ALL_DAYS[i]?.monthNum;return ALL_DAYS.filter(d=>d.monthNum===mn);}
  return[];
}
function renderPdfModal(){
  const days=getPdfDays();
  const first=days[0],last=days[days.length-1];
  const preview=days.length===1?`${first?.dayName} ${first?.day} ${first?.month}`:`${first?.day} ${first?.month} – ${last?.day} ${last?.month}`;
  document.getElementById('pdf-modal-body').innerHTML=`
  <div class="card" style="margin-bottom:12px">
    <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:#374151">📋 نوع التقرير</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${[{k:'day',l:'📄 يومي'},{k:'2days',l:'📄 يومان'},{k:'week',l:'📅 أسبوعي'},{k:'month',l:'📆 شهري'}].map(p=>`
        <button onclick="S.pdfPeriod='${p.k}';renderPdfModal()" style="flex:1;min-width:100px;padding:10px 8px;border-radius:9px;border:2px solid ${S.pdfPeriod===p.k?'#0d7a5f':'#e5e7eb'};background:${S.pdfPeriod===p.k?'#daf0e8':'white'};color:${S.pdfPeriod===p.k?'#0d7a5f':'#555'};font-size:13px;font-weight:${S.pdfPeriod===p.k?700:400};font-family:'Tajawal',sans-serif">${p.l}</button>`).join('')}
    </div>
  </div>
  <div class="card" style="margin-bottom:12px">
    <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:#374151">📅 اختر الفترة</div>
    ${S.pdfPeriod==='day'||S.pdfPeriod==='2days'?`<select onchange="S.pdfSelIdx=Number(this.value);renderPdfModal()" style="width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #e5e7eb;font-size:13px;background:white;color:#374151;font-family:'Tajawal',sans-serif">
      ${ALL_DAYS.map(d=>`<option value="${d.idx}" ${d.idx===S.pdfSelIdx?'selected':''}>${d.dayName} – ${d.day} ${d.month} ${d.year}</option>`).join('')}
    </select>`:''}
    ${S.pdfPeriod==='week'?`<div style="display:flex;gap:6px;flex-wrap:wrap">
      ${WEEK_NUMS.map(wn=>{const cur=ALL_DAYS[S.pdfSelIdx]?.weekNum;return`<button onclick="S.pdfSelIdx=${WEEKS_MAP[wn][0].idx};renderPdfModal()" style="flex:1;min-width:80px;padding:8px 6px;border-radius:8px;border:2px solid ${cur===wn?'#0d7a5f':'#e5e7eb'};background:${cur===wn?'#daf0e8':'white'};color:${cur===wn?'#0d7a5f':'#555'};font-size:11px;font-weight:${cur===wn?700:400};line-height:1.4;text-align:center;font-family:'Tajawal',sans-serif;cursor:pointer">أسبوع ${wn}<br><span style="font-size:9px;opacity:.7">${weekDateRange(wn)}</span></button>`;}).join('')}
    </div>`:''}
    ${S.pdfPeriod==='month'?`<div style="display:flex;gap:6px;flex-wrap:wrap">
      ${[...new Set(ALL_DAYS.map(d=>d.monthNum))].map(mn=>{const cur=ALL_DAYS[S.pdfSelIdx]?.monthNum;const yr=ALL_DAYS.find(d=>d.monthNum===mn)?.year;return`<button onclick="S.pdfSelIdx=${ALL_DAYS.find(d=>d.monthNum===mn).idx};renderPdfModal()" style="flex:1;min-width:90px;padding:9px 8px;border-radius:8px;border:2px solid ${cur===mn?'#0d7a5f':'#e5e7eb'};background:${cur===mn?'#daf0e8':'white'};color:${cur===mn?'#0d7a5f':'#555'};font-size:13px;font-weight:${cur===mn?700:400};font-family:'Tajawal',sans-serif;cursor:pointer">${AR_MONTHS[mn]} ${yr}</button>`;}).join('')}
    </div>`:''}
    <div style="margin-top:10px;padding:8px 12px;background:#f0fdf4;border-radius:8px;font-size:12px;color:#0d7a5f;font-weight:600">📄 ${preview} (${days.length} يوم)</div>
  </div>
  <div class="card" style="margin-bottom:12px">
    <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:#374151">✏️ عنوان التقرير</div>
    <input value="${S.pdfHeader}" oninput="S.pdfHeader=this.value" style="width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #e5e7eb;font-size:13px;color:#374151"/>
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:#374151">📝 ملاحظات</div>
    <textarea oninput="S.pdfNotes=this.value" rows="3" placeholder="ملاحظات تظهر في التقرير..." style="width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #e5e7eb;font-size:13px;resize:vertical;color:#374151;line-height:1.6">${S.pdfNotes}</textarea>
  </div>`;
}
function doPrint(){
  const days=getPdfDays();
  if(!days.length)return;
  const periodLabel={day:'يومي','2days':'يومان',week:'أسبوعي',month:'شهري'}[S.pdfPeriod];
  const f=days[0],l=days[days.length-1];
  const dateRange=days.length===1?`${f.dayName} ${f.day} ${f.month} ${f.year}`:`${f.day} ${f.month} – ${l.day} ${l.month} ${f.year}`;
  const rows=days.map(d=>{
    const s=S.schedule[d.idx]||{oncall:[],managerPresent:false};
    const oncall=s.oncall||[];
    const mp=s.managerPresent;
    const assign=S.clinicAssign[d.idx]||{};
    const cov=S.coverage[d.idx]||{};
    const pairs=S.shiftPairs[d.idx]||{};
    const empType=S.empType[d.idx]||{};
    const notes=S.empNotes[d.idx]||{};
    const cEmp={};Object.entries(assign).forEach(([e,c])=>cEmp[c]=e);
    const absent=EMPLOYEES.filter(e=>!isPresent(e,d.idx));
    const oncallSet=new Set(oncall);
    const clinicStaff=EMPLOYEES.filter(e=>isPresent(e,d.idx)&&!oncallSet.has(e));
    const processedPdf=new Set();
    let groupsHTML='';
    const pdfEmpLine=(e)=>{
      const note=notes[e];
      return`أ. ${fn(e)}${assign[e]?' — '+getClinicName(assign[e]):''}${cov[e]?' (يغطي '+getClinicName(cov[e])+')':''}${note?` <span style="color:#6b7280;font-size:9px">| ${note}</span>`:''}`;
    };
    // Shift pairs first
    clinicStaff.forEach(emp=>{
      if(processedPdf.has(emp))return;
      const pair=pairs[emp];
      if(pair&&clinicStaff.includes(pair)&&!processedPdf.has(pair)){
        processedPdf.add(emp);processedPdf.add(pair);
        groupsHTML+=`<div style="margin:4px 0;padding:5px 8px;background:#fffbeb;border-radius:6px;border-right:3px solid #f59e0b;font-size:11px">
          <div style="font-size:9px;color:#b45309;font-weight:700;margin-bottom:3px">↕ شيفت</div>
          <div>${pdfEmpLine(emp)}</div>
          <div style="margin-top:2px">${pdfEmpLine(pair)}</div>
        </div>`;
      }
    });
    // Manager
    if(mp){const note=notes[MANAGER];groupsHTML+=`<div style="font-size:11px;padding:4px 0;border-bottom:1px dashed #e5e7eb">👨‍⚕️ ${pdfEmpLine(MANAGER)}</div>`;}
    // Full/solo
    clinicStaff.forEach(emp=>{
      if(processedPdf.has(emp))return;
      processedPdf.add(emp);
      groupsHTML+=`<div style="font-size:11px;padding:4px 0;border-bottom:1px dashed #e5e7eb">${pdfEmpLine(emp)}</div>`;
    });
    return`<div style="margin-bottom:14px;page-break-inside:avoid">
      <div style="background:#0d7a5f;color:white;padding:8px 14px;border-radius:8px 8px 0 0;display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:15px;font-weight:800">${d.dayName} ${d.day} ${d.month} ${d.year}</div>
        <div style="font-size:11px;opacity:.8">الأسبوع ${d.weekNum}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 8px 8px;overflow:hidden">
        <div style="border-left:1px solid #e5e7eb">
          <div style="background:#f0fdf4;padding:6px 10px;font-size:11px;font-weight:700;color:#0d7a5f;border-bottom:1px solid #e5e7eb">🏥 مجموعة أ — العيادات</div>
          <div style="padding:8px 10px">${groupsHTML}</div>
        </div>
        <div>
          <div style="background:#eff6ff;padding:6px 10px;font-size:11px;font-weight:700;color:#1e40af;border-bottom:1px solid #e5e7eb">📞 مجموعة ب — OnCall (${oncall.length})</div>
          <div style="padding:10px;font-size:12px;line-height:2">${oncall.map(e=>`<div style="padding:3px 0;border-bottom:1px dashed #f3f4f6">أ. ${fn(e)}</div>`).join('')}</div>
          ${absent.length?`<div style="background:#fef9c3;padding:6px 10px;font-size:11px;border-top:1px solid #e5e7eb">🏖️ إجازة: ${absent.map(e=>fn(e)).join('، ')}</div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
  closePdfModal();
  document.getElementById('print-area').innerHTML=`
    <div style="font-family:'Tajawal',sans-serif;direction:rtl;color:#1a1a1a">
      <div style="border-bottom:3px solid #0d7a5f;padding-bottom:12px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-end">
        <div>
          <div style="font-size:20px;font-weight:800;color:#0d7a5f">🦷 جدول توزيع العيادات ومناوبة OnCall</div>
          <div style="font-size:13px;color:#6b7280;margin-top:4px">${S.pdfHeader}</div>
        </div>
        <div style="text-align:left;font-size:12px;color:#6b7280">
          <div>الفترة: <strong>${periodLabel}</strong></div><div>${dateRange}</div>
          <div>طُبع: ${new Date().toLocaleDateString('ar-SA')}</div>
        </div>
      </div>
      ${S.pdfNotes?`<div style="background:#fef9e7;border:1.5px solid #fde68a;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#78350f;white-space:pre-wrap">${S.pdfNotes}</div>`:''}
      ${rows}
      <div style="margin-top:14px;border-top:1px solid #e5e7eb;padding-top:8px;font-size:10px;color:#9ca3af">قسم صحة الفم والأسنان • 4:00م – 11:00م • 10 عيادات</div>
    </div>`;
  window.print();
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
function applyData(data){
  if(!data)return;
  if(data.vac)S.vac=data.vac;
  if(data.schedule)S.schedule=data.schedule;
  if(data.clinicAssign)S.clinicAssign=data.clinicAssign;
  if(data.coverage)S.coverage=data.coverage;
  if(data.clinicNames)S.clinicNames=data.clinicNames;
  if(data.empType)S.empType=data.empType;
  if(data.shiftPairs)S.shiftPairs=data.shiftPairs;
  if(data.oncallNeeded)S.oncallNeeded=data.oncallNeeded;
  if(data.empNotes)S.empNotes=data.empNotes;
  if(data.selDay!=null)S.selDay=data.selDay;
  if(data.curWeek!=null)S.curWeek=data.curWeek;
}

function showApp(){
  if(!Object.keys(S.schedule).length)S.schedule=buildInit();
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  render();
}

async function init(){
  const isLocal=location.protocol==='file:';
  const lsData=lsLoad();
  if(lsData)applyData(lsData);
  showApp();
  if(!isLocal){
    fbLoad().then(fbData=>{
      if(fbData){
        applyData(fbData);
        lsSave({vac:S.vac,schedule:S.schedule,clinicAssign:S.clinicAssign,
          coverage:S.coverage,clinicNames:S.clinicNames,empType:S.empType,
          shiftPairs:S.shiftPairs,oncallNeeded:S.oncallNeeded,empNotes:S.empNotes,
          selDay:S.selDay,curWeek:S.curWeek});
        render();
      }
    }).catch(()=>{});
  }
}
init();
</script>
